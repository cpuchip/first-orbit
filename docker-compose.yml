# First Orbit — multiplayer.
# Deploy: Dokploy builds this compose and routes orbit.cpuchip.net -> game:8080
#         via Traefik over the internal network (no host port published).
# Local dev: use `npm run dev` (+ `npm run dev:server`), not this compose.

services:
  game:
    build: .
    container_name: first-orbit
    restart: unless-stopped
    environment:
      - PORT=8080
      - STATE_DIR=/data
    volumes:
      # persists the shared space program across redeploys/restarts
      - first-orbit-state:/data
    # No host port publish: the Dokploy VPS runs several apps that all listen on
    # 8080 inside their container (deadweight, chattermax, …), so publishing host
    # 8080 collides on bind. Traefik routes orbit.cpuchip.net -> game:8080 over the
    # internal network using the exposed port. For local container testing, run:
    #   docker run --rm -p 8080:8080 $(docker compose build -q game || echo first-orbit)
    expose:
      - "8080"
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  first-orbit-state:
